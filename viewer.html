<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บทเรียน - JurisHub Thailand</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: {
                colors: { primary: '#1E293B', secondary: '#64748B', accent: '#92400E', bg: '#F8FAFC' },
                fontFamily: { sans: ['Prompt', 'sans-serif'], serif: ['Sarabun', 'serif'] }
            }}
        }
    </script>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .sidebar-link.active { background-color: #1E293B; color: white; }
        .sidebar-link { transition: all 0.2s ease; }
        .sidebar-link:hover:not(.active) { background-color: #F1F5F9; }
        .article-card { border-left: 4px solid #92400E; }
        .case-ref { background: linear-gradient(135deg, #FEF3C7 0%, #FDE68A 100%); }
        @media (max-width: 767px) {
            .viewer-sidebar { transform: translateX(-100%); position: fixed; top: 0; left: 0; z-index: 40; height: 100vh; }
            .viewer-sidebar.open { transform: translateX(0); }
        }
    </style>
</head>
<body class="bg-bg text-slate-900 font-sans antialiased">

    <!-- Navigation Bar -->
    <nav class="navbar w-full py-4 px-6 md:px-12 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-primary text-white rounded-lg flex items-center justify-center font-serif font-bold text-xl shadow-md">JH</div>
            <a href="index.html" class="text-2xl font-serif font-bold text-primary tracking-tight hidden sm:block">JurisHub <span class="text-accent text-lg">Thailand</span></a>
        </div>
        <div class="hidden md:flex space-x-8">
            <a href="index.html" class="nav-link">หน้าหลัก</a>
            <a href="catalog.html" class="nav-link">คลังวิชา</a>
            <a href="articles.html" class="nav-link">คลังมาตรา</a>
            <a href="exam.html" class="nav-link">ข้อสอบเก่า</a>
            <a href="about.html" class="nav-link">เกี่ยวกับ</a>
        </div>
        <button id="mobile-menu-btn" class="md:hidden text-primary focus:outline-none">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
    </nav>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="fixed inset-0 bg-primary/95 z-50 transform translate-x-full transition-transform duration-300 md:hidden flex flex-col pt-20 px-8">
        <button id="close-menu-btn" class="absolute top-6 right-6 text-white">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
        <a href="index.html" class="text-white text-2xl py-4 border-b border-white/20 font-serif">หน้าหลัก</a>
        <a href="catalog.html" class="text-white text-2xl py-4 border-b border-white/20 font-serif">คลังวิชา</a>
        <a href="articles.html" class="text-white text-2xl py-4 border-b border-white/20 font-serif">คลังมาตรา</a>
        <a href="exam.html" class="text-white text-2xl py-4 border-b border-white/20 font-serif">ข้อสอบเก่า</a>
        <a href="about.html" class="text-white text-2xl py-4 font-serif">เกี่ยวกับ</a>
    </div>

    <!-- Subject Header Bar -->
    <header class="bg-primary text-white py-6 px-6 md:px-12">
        <div class="max-w-7xl mx-auto flex items-center gap-4">
            <a href="catalog.html" class="text-white/70 hover:text-white transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </a>
            <div class="flex-1">
                <div class="flex items-center gap-3 mb-1">
                    <span id="viewer-code" class="bg-white/20 text-white badge font-mono text-sm"></span>
                    <span id="viewer-category" class="bg-accent text-white badge text-sm"></span>
                </div>
                <h1 id="viewer-title" class="text-xl md:text-2xl font-bold font-serif"></h1>
                <p id="viewer-subtitle" class="text-sm text-slate-300 mt-1"></p>
            </div>
            <!-- Mobile sidebar toggle -->
            <button id="toggle-sidebar-btn" class="md:hidden bg-white/10 p-2 rounded-lg">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
            </button>
        </div>
    </header>

    <!-- Main Layout -->
    <div class="max-w-7xl mx-auto flex">

        <!-- Sticky Sidebar -->
        <aside id="viewer-sidebar" class="viewer-sidebar w-72 bg-white border-r border-slate-200 p-4 md:sticky md:top-[73px] md:h-[calc(100vh-73px)] overflow-y-auto flex-shrink-0 shadow-xl md:shadow-none">
            <div class="flex justify-between items-center mb-4 md:hidden">
                <h3 class="font-bold font-serif text-primary">สารบัญ</h3>
                <button id="close-sidebar-btn" class="text-slate-500"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            <h3 class="font-bold font-serif text-primary mb-4 hidden md:block">สารบัญ</h3>
            <!-- Progress -->
            <div class="mb-4">
                <div class="flex justify-between text-xs text-secondary mb-1">
                    <span>ความคืบหน้า</span>
                    <span id="progress-text">0%</span>
                </div>
                <div class="w-full bg-slate-200 rounded-full h-2">
                    <div id="progress-bar" class="bg-accent h-2 rounded-full transition-all duration-500" style="width:0%"></div>
                </div>
            </div>
            <nav id="chapter-list" class="space-y-1"></nav>
        </aside>

        <!-- Sidebar Overlay Mobile -->
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/30 z-30 hidden md:hidden"></div>

        <!-- Content Area -->
        <main id="content-area" class="flex-1 p-6 md:p-10 min-h-screen">
            <!-- Content rendered by JS -->
            <div id="content-loading" class="text-center py-20">
                <div class="w-16 h-16 rounded-full bg-slate-100 flex items-center justify-center mx-auto mb-4 animate-pulse">📚</div>
                <p class="text-secondary">กำลังโหลดเนื้อหา...</p>
            </div>
            <div id="content-body" class="hidden"></div>

            <!-- Related Articles Section [NEW] -->
            <section id="related-articles-section" class="mt-12 pt-10 border-t-2 border-slate-100 hidden">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-2 h-8 bg-accent rounded-full"></div>
                    <h3 class="text-2xl font-bold font-serif text-primary">มาตราที่เกี่ยวข้องในวิชานี้</h3>
                </div>
                <div id="related-articles-list" class="space-y-4">
                    <!-- Loaded dynamically from articlesData -->
                </div>
            </section>

            <!-- Navigation buttons -->
            <div id="chapter-nav" class="hidden mt-12 pt-8 border-t border-slate-200 flex justify-between items-center">
                <button id="prev-chapter" class="flex items-center gap-2 px-5 py-3 btn-outline rounded-xl font-medium">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    บทก่อนหน้า
                </button>
                <button id="next-chapter" class="flex items-center gap-2 px-5 py-3 btn-primary rounded-xl font-medium shadow-md">
                    บทถัดไป
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </button>
            </div>
        </main>
    </div>

    <!-- Footer -->
    <footer class="bg-primary text-slate-300 py-8 mt-10 border-t border-slate-800">
        <div class="max-w-7xl mx-auto px-6 text-center text-sm opacity-60">
            <p>&copy; 2026 JurisHub Thailand. ศูนย์รวมวิชากฎหมายไทย</p>
        </div>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/articles-data.js"></script>
    <script src="js/content-data.js"></script>
    <script src="js/viewer.js"></script>
</body>
</html>
